<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket - Portals Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Шапка как в Portals -->
        <div class="header">
            <div class="balance-section">
                <span class="balance">0</span>
                <span class="currency">OTON</span>
            </div>
            <div class="stats">
                <span class="collections">3 collections</span>
                <span class="commission">Commission 0%</span>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active">All items</button>
            <button class="tab">Collections</button>
            <button class="tab">Bundles</button>
        </div>

        <!-- Quick find -->
        <div class="quick-find">
            <i class="fas fa-search"></i>
            <span>Quick find</span>
        </div>

        <!-- Основные кнопки -->
        <div class="main-buttons">
            <div class="button-row">
                <div class="main-btn" data-action="collection">
                    <i class="fas fa-layer-group"></i>
                    <span>Collection</span>
                </div>
                <div class="main-btn" data-action="model">
                    <i class="fas fa-cube"></i>
                    <span>Model</span>
                </div>
            </div>

            <div class="button-row">
                <div class="main-btn" data-action="back">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back</span>
                </div>
                <div class="main-btn" data-action="store">
                    <i class="fas fa-store"></i>
                    <span>Store</span>
                </div>
                <div class="main-btn" data-action="season">
                    <i class="fas fa-calendar"></i>
                    <span>Season</span>
                </div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <nav class="bottom-nav">
            <div class="nav-item" data-nav="nft">
                <i class="fas fa-image"></i>
                <span>NFT</span>
            </div>
            <div class="nav-item" data-nav="gift">
                <i class="fas fa-gift"></i>
                <span>My gift</span>
            </div>
            <div class="nav-item" data-nav="profile">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
