<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <div class="header">
            <div class="balance">0 OTON</div>
            <div class="header-info">
                <span>3 collections</span>
                <span class="commission">Commission 0%</span>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active">All items</button>
            <button class="tab">Collections</button>
            <button class="tab">Bundles</button>
        </div>

        <!-- Quick find -->
        <div class="quick-find">
            <i class="fas fa-search"></i>
            <span>Quick find</span>
        </div>

        <!-- Кнопки -->
        <div class="buttons-grid">
            <div class="button-item">
                <i class="fas fa-layer-group"></i>
                <span>Collection</span>
            </div>
            <div class="button-item">
                <i class="fas fa-cube"></i>
                <span>Model</span>
            </div>
            <div class="button-item">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </div>
            <div class="button-item">
                <i class="fas fa-store"></i>
                <span>Store</span>
            </div>
            <div class="button-item">
                <i class="fas fa-calendar"></i>
                <span>Season</span>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <div class="nav-item">
                <i class="fas fa-image"></i>
                <span>NFT</span>
            </div>
            <div class="nav-item" id="giftButton">
                <i class="fas fa-gift"></i>
                <span>My gift</span>
            </div>
            <div class="nav-item" id="profileButton">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
        </div>

        <!-- Страница My Gift -->
        <div id="giftPage" style="display: none;">
            <div class="page-header">
                <button class="back-btn" id="backFromGift">←</button>
                <h2>My Gift</h2>
            </div>
            <div class="gift-content">
                <div class="nft-zero">0 NFT</div>
                <div class="gift-buttons">
                    <button class="replenish-btn" id="replenishBtn">Пополнить</button>
                    <button class="withdraw-btn" id="withdrawBtn">Вывести</button>
                </div>
            </div>
        </div>

        <!-- Страница Profile -->
        <div id="profilePage" style="display: none;">
            <div class="page-header">
                <button class="back-btn" id="backFromProfile">←</button>
                <h2>Profile</h2>
            </div>
            <div class="profile-content">
                <div class="profile-info">
                    <p>NFT: 5</p>
                    <p>Зарегистрирован: 12.03.2024</p>
                </div>
                <div class="transactions">
                    <h3>Последние транзакции</h3>
                    <p>• Получено NFT (14:30)</p>
                    <p>• Подарок от @friend (вчера)</p>
                </div>
            </div>
        </div>

        <!-- Модалка менеджера -->
        <div id="managerModal" style="display: none;">
            <div class="modal-content">
                <p>Напишите менеджеру:</p>
                <div class="manager" id="managerLink">@ManagerKupiKod</div>
                <button class="close-btn" id="closeModal">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
