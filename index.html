<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xRocket - OTON</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Маленький кошелек в правом верхнем углу -->
        <div class="wallet-corner">
            <div class="wallet-icon">
                <i class="fas fa-wallet"></i>
            </div>
            <div class="wallet-info">
                <span class="wallet-balance">0</span>
                <span class="wallet-currency">OTON</span>
            </div>
        </div>

        <!-- Основное меню -->
        <div class="main-menu">
            <!-- Вкладки -->
            <div class="tabs">
                <button class="tab active">All items</button>
                <button class="tab">Collections</button>
                <button class="tab">Bundles</button>
            </div>

            <!-- Поиск -->
            <div class="quick-find">
                <i class="fas fa-search"></i>
                <span>Quick find</span>
            </div>

            <!-- Collection и Model -->
            <div class="items-grid">
                <!-- Collection -->
                <div class="menu-item collection-item" data-action="collection">
                    <div class="item-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span>Collection</span>
                </div>

                <!-- Model -->
                <div class="menu-item model-item" data-action="model">
                    <div class="item-icon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <span>Model</span>
                </div>
            </div>

            <!-- Нижняя навигация (только нужные кнопки) -->
            <nav class="bottom-nav">
                <div class="nav-item" data-nav="nft">
                    <i class="fas fa-image"></i>
                    <span>NFT</span>
                </div>
                <div class="nav-item" data-nav="gift">
                    <i class="fas fa-gift"></i>
                    <span>My gift</span>
                </div>
                <div class="nav-item" data-nav="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </div>
            </nav>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
